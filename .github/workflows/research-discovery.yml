name: Research Discovery

on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 12 * * *"
  workflow_dispatch:
    inputs:
      scan_type:
        description: "Type of discovery scan"
        required: true
        default: "full"
        type: choice
        options:
          - quick
          - full

concurrency:
  group: research-discovery
  cancel-in-progress: false

jobs:
  discovery:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install function dependencies
        working-directory: functions
        run: npm install --omit=dev

      - name: Write Firebase Admin credentials
        shell: bash
        env:
          FIREBASE_ADMIN_CREDENTIALS: ${{ secrets.FIREBASE_ADMIN_CREDENTIALS }}
        run: |
          test -n "$FIREBASE_ADMIN_CREDENTIALS"
          credentials_file="$RUNNER_TEMP/firebase-admin.json"
          printf '%s' "$FIREBASE_ADMIN_CREDENTIALS" > "$credentials_file"
          chmod 600 "$credentials_file"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$credentials_file" >> "$GITHUB_ENV"

      - name: Run server-side discovery
        working-directory: functions
        env:
          DISCOVERY_USER_UIDS: ${{ secrets.DISCOVERY_USER_UIDS }}
          DISCOVERY_ALLOWED_EMAIL: ${{ secrets.DISCOVERY_ALLOWED_EMAIL }}
          DISCOVERY_SCAN_ALL_USERS: ${{ vars.DISCOVERY_SCAN_ALL_USERS }}
          DISCOVERY_SCAN_TYPE: ${{ github.event.inputs.scan_type || 'full' }}
        run: npm run run-discovery

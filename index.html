<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="theme-color" content="#102A4C" />
    <meta name="description" content="Anubha Parashar's private research vault." />
    <meta name="application-name" content="AP Research Vault" />
    <meta name="apple-mobile-web-app-title" content="AP Research Vault" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Anubha Parashar Research Vault</title>
    <style>
      .startup-fallback { box-sizing: border-box; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #fcfaf6; color: #102a4c; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .startup-fallback article { width: min(520px, 100%); padding: 24px; border: 1px solid rgba(16, 42, 76, 0.16); border-radius: 12px; background: #fff; box-shadow: 0 18px 44px rgba(16, 42, 76, 0.14); }
      .startup-fallback h1 { margin: 0 0 8px; font-size: 1.35rem; }
      .startup-fallback p { margin: 0; line-height: 1.5; color: #516070; }
      .startup-fallback button { margin-top: 16px; min-height: 40px; padding: 0 16px; border: 0; border-radius: 8px; background: #102a4c; color: #fff; font-weight: 800; cursor: pointer; }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="%BASE_URL%favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="apple-touch-icon" href="%BASE_URL%icons/ap-icon-192.png" />
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore-compat.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root">
      <div class="startup-fallback">
        <article>
          <h1>Loading Research Vault</h1>
          <p>If this message stays on screen, refresh once to load the newest GitHub Pages build.</p>
        </article>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
